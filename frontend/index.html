<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" type="image/png" href="assets/icons/icono.png">
    <title>Espacio Gamer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
  </head>
  <body class="d-flex align-items-center justify-content-center" style="height: 100vh;">
    
    <main class="w-100" style="max-width: 400px;">
      <form class="p-4 border rounded shadow-sm">
        <h1 class="h4 mb-3 text-center">Iniciar sesión</h1>

        <div class="form-floating mb-2">
          <input type="email" class="form-control" id="email" placeholder="name@example.com">
          <label for="email">Email</label>
        </div>

        <div class="form-floating mb-3">
          <input type="password" class="form-control" id="password" placeholder="Password">
          <label for="password">Contraseña</label>
        </div>

        <button class="btn btn-primary w-100" type="submit">Entrar</button>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
